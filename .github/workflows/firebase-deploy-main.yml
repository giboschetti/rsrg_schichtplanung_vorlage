name: Deploy to Firebase (main)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RSRG_SCHICHTPLANUNG }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting + Firestore rules
        run: firebase deploy --only hosting,firestore --project rsrg-schichtplanung --non-interactive
